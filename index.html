<!DOCTYPE html>

<title>Prompt Builder v9.0</title>
<style>
:root {
  --fs: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --fm: 'SF Mono','Menlo','Monaco',monospace;
  --tp: #1a1a1a; --ts: #555; --tt: #888;
  --bp: #ffffff; --bs: #f4f4f2;
  --ok-bg: #e8f5e9; --ok-tx: #2e7d32;
  --info-bg: #e8f0fe; --info-tx: #1a56db; --info-bd: #b5d4f4;
  --warn-bg: #fff8e1; --warn-tx: #b45309;
  --mod-bd: #BA7517; --mod-bg: #FAEEDA;
  --b1: rgba(0,0,0,0.35); --b2: rgba(0,0,0,0.2); --b3: rgba(0,0,0,0.1);
  --r: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --tp: #efefef; --ts: #aaa; --tt: #666;
    --bp: #1e1e1e; --bs: #272727;
    --ok-bg: #1b3a1e; --ok-tx: #81c784;
    --info-bg: #1a2a4a; --info-tx: #82b4f0; --info-bd: #185fa5;
    --warn-bg: #2a1f00; --warn-tx: #fbbf24;
    --mod-bd: #EF9F27; --mod-bg: #2a1f00;
    --b1: rgba(255,255,255,0.3); --b2: rgba(255,255,255,0.18); --b3: rgba(255,255,255,0.09);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fs);background:var(--bs);color:var(--tp);min-height:100vh;padding:32px 20px}
.wrap{max-width:900px;margin:0 auto;background:var(--bp);border:0.5px solid var(--b3);border-radius:12px;padding:24px 28px 32px}
h2{font-size:17px;font-weight:500;color:var(--tp);margin-bottom:2px}
.sub{font-size:12px;color:var(--ts);margin-bottom:20px}
.tabs-bar{display:flex;margin-bottom:20px;border-bottom:0.5px solid var(--b3)}
.tab-btn{padding:8px 20px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--ts);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:var(--fs)}
.tab-btn.on{color:var(--tp);border-bottom-color:var(--tp);font-weight:500}
.json-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.json-row textarea{flex:1;height:68px;font-family:var(--fm);font-size:11px;padding:8px 10px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bs);color:var(--tp);resize:none;line-height:1.5}
.json-row textarea:focus{outline:none;border-color:var(--b1)}
.load-btn{padding:8px 14px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bp);color:var(--tp);cursor:pointer;white-space:nowrap;font-family:var(--fs);font-weight:500}
.load-btn:hover{background:var(--bs)}
.load-btn:disabled{opacity:0.4;cursor:not-allowed}
.legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ts)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-d{border:1px solid var(--b2)}
.dot-a{background:var(--info-tx)}
.dot-m{background:var(--mod-bd)}
.acc{border:0.5px solid var(--b3);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.acc-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bp);user-select:none}
.acc-h:hover{background:var(--bs)}
.acc-hl{display:flex;align-items:center;gap:10px}
.acc-title{font-size:13px;font-weight:500;color:var(--tp)}
.acc-sub{font-size:11px;color:var(--tt);margin-top:1px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--info-bg);color:var(--info-tx);font-weight:500}
.chev{font-size:10px;color:var(--tt);transition:transform .15s}
.chev.open{transform:rotate(180deg)}
.acc-b{padding:14px;border-top:0.5px solid var(--b3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 12px}
.fw{grid-column:1/-1}
.fld{display:flex;flex-direction:column;gap:3px}
.lbl{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--ts);text-transform:uppercase;letter-spacing:.06em}
.opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--tt);margin-left:3px;font-size:10px}
.rst{font-size:10px;color:var(--tt);cursor:pointer;margin-left:auto;text-decoration:underline}
.rst:hover{color:var(--ts)}
.inp{font-family:var(--fs);font-size:13px;color:var(--tp);background:var(--bp);border:0.5px solid var(--b2);border-radius:var(--r);padding:6px 10px;width:100%}
.inp:hover{border-color:var(--b1)}

.check-lbl{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--tp);cursor:pointer}

.note-box{background:var(--bs);border:0.5px solid var(--b3);border-radius:var(--r);padding:10px 12px}
.note-title{font-size:11px;font-weight:500;margin-bottom:4px;color:var(--tp)}
.note-val{font-size:11px;color:var(--ts);line-height:1.6;white-space:pre-wrap}
.divider{height:0.5px;background:var(--b3);margin:12px 0}

.sub-tab.on{background:var(--bs);border-color:var(--b1);color:var(--tp);font-weight:500}

.leo-cfg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px;margin-bottom:12px;padding:12px 14px;background:var(--bs);border:0.5px solid var(--b3);border-radius:var(--r)}

.out-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.out-label{font-size:11px;font-weight:500;color:var(--tt);text-transform:uppercase;letter-spacing:.06em}
.copy-sm{padding:4px 12px;font-size:11px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bp);color:var(--tp);cursor:pointer;font-family:var(--fs);font-weight:500}
.copy-sm:hover{background:var(--bs)}
.copy-sm.ok{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-tx)}
.ver-note{font-size:11px;padding:8px 10px;border-radius:var(--r);background:var(--warn-bg);color:var(--warn-tx);margin-bottom:10px;line-height:1.5}
.img-note{font-size:11px;padding:8px 10px;border-radius:var(--r);background:var(--info-bg);color:var(--info-tx);margin-bottom:10px;line-height:1.5}
.dis-note{font-size:12px;color:var(--tt);padding:6px 0}
.ck-sm{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ts);cursor:pointer}
.img-toggle{display:flex;gap:4px;margin-bottom:12px}
.img-btn{padding:5px 12px;font-size:12px;border-radius:var(--r);cursor:pointer;background:transparent;border:0.5px solid var(--b3);color:var(--ts);font-family:var(--fs)}

.fmt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fmt-tabs{display:flex;gap:4px}
.fmt-tab{padding:5px 12px;font-size:12px;border-radius:var(--r);cursor:pointer;background:transparent;border:0.5px solid var(--b3);color:var(--ts);font-family:var(--fs)}
.fmt-tab.on{background:var(--bs);border-color:var(--b1);color:var(--tp);font-weight:500}
.copy-btn{padding:5px 16px;font-size:12px;border-radius:var(--r);cursor:pointer;border:0.5px solid var(--b2);background:transparent;color:var(--tp);font-family:var(--fs);font-weight:500}
.copy-btn.ok{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-tx)}
textarea.out{width:100%;font-family:var(--fm);font-size:12px;padding:12px;border:0.5px solid var(--b3);border-radius:var(--r);background:var(--bs);color:var(--tp);resize:vertical;line-height:1.6}
.preset-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.free-notes{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--b3)}
.mj-note{font-size:11px;color:var(--tt);padding:8px 10px;background:var(--bs);border-radius:var(--r);margin-top:8px;line-height:1.5}
/* ── v9.0 — API layer ─────────────────────────────── */
.api-btn{padding:4px 10px;font-size:11px;border:0.5px solid var(--info-bd);border-radius:var(--r);background:var(--info-bg);color:var(--info-tx);cursor:pointer;font-family:var(--fs);font-weight:500;white-space:nowrap}
.api-btn:hover{opacity:.85}
.api-btn:disabled{opacity:.4;cursor:not-allowed}
.api-btn-row{display:flex;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--b3)}
.api-key-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:7px 10px;background:var(--bs);border-radius:var(--r);border:0.5px solid var(--b3);font-size:11px;color:var(--ts)}
.api-key-bar input{flex:1;font-family:var(--fm);font-size:11px;color:var(--tp);background:var(--bp);border:0.5px solid var(--b2);border-radius:var(--r);padding:4px 8px}
.api-key-bar input:focus{outline:none;border-color:var(--b1)}
.api-key-dot{width:6px;height:6px;border-radius:50%;background:var(--ok-tx);flex-shrink:0}
.api-key-dot.off{background:var(--warn-tx)}
.api-err{font-size:11px;color:var(--warn-tx);padding:6px 8px;background:var(--warn-bg);border-radius:var(--r);margin-bottom:8px;line-height:1.5}
.orig-input-row{margin-bottom:10px}
.opt-prompt{margin-top:12px;border:0.5px solid var(--info-bd);border-radius:var(--r);overflow:hidden}
.opt-prompt-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--info-bg);border-bottom:0.5px solid var(--info-bd)}
.opt-prompt-lbl{font-size:11px;font-weight:500;color:var(--info-tx);text-transform:uppercase;letter-spacing:.06em}
.stale-hint{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--warn-tx);margin-top:4px;font-style:italic}

<div class="wrap"><div id="root"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useCallback,createElement:h}=React;

// ─── Constants ───────────────────────────────────────────────────────────────
const V="9.04";

const GENRES=[
  {value:"portrait",label:"Personaggio / Ritratto",prefix:"portrait of"},
  {value:"stilllife",label:"Still-life",prefix:"still life of"},
  {value:"landscape",label:"Paesaggio",prefix:"landscape photograph of"},
  {value:"urban",label:"Urban / Street",prefix:"street photograph of"},
  {value:"interior",label:"Interni",prefix:"interior photograph of"},
  {value:"architecture",label:"Architettura",prefix:""},
  {value:"other",label:"Altro / Libero",prefix:""},
];

const GREYED_FIELDS={
  portrait:[],
  stilllife:["subject_action","costume"],
  landscape:["subject_action","costume"],
  urban:[],
  interior:["subject_action","costume"],
  architecture:["subject_action","costume"],
  other:[],
};

const MJ_TASK_FB="expressive ink sketch watercolor editorial illustration";
const NO_DEFAULT="text, watermark, logo, symmetry, perfect edges, photorealistic skin texture, 3D rendering, CGI";
const LS_API_KEY="pb_api_key_v1";

// Campi sorgente di core_style — quando uno di questi cambia, core_style è potenzialmente stale
const CORE_STYLE_DEPS=["genre_primary","genre_modifiers","aesthetic_vibe","art_movement","era_period",
  "artist_reference","medium_technique","medium_render_style","surface_quality","line_quality_style",
  "elements_to_add","elements_to_avoid","line_quality"];

// ─── System prompts API — Layer 2 ────────────────────────────────────────────
const SYSTEM_LUCE=`Sei uno specialista in illuminazione fotografica e artistica per AI image generation.

Ricevi un JSON con i campi luce di una scena. Il tuo compito è eliminare le sovrapposizioni tra lighting_direction e lighting_setup producendo una descrizione coerente del sistema di illuminazione.

DEFINIZIONI:
- lighting_direction: DA DOVE viene la luce — posizione spaziale pura ("from the left", "overhead", "backlight")
- lighting_setup: COME è costruita tecnicamente — nome della tecnica o descrizione delle sorgenti ("Rembrandt lighting", "chiaroscuro", "desk lamp + window light")
- lighting_quality: CHE CARATTERE ha la luce — ("soft", "hard", "diffused")
- time_lighting: NON modificarlo — descrive il contesto temporale/atmosferico, non l'illuminazione tecnica

REGOLE DI FUSIONE:
1. Se lighting_direction e lighting_setup si sovrappongono (stessa informazione in entrambi): metti la tecnica nominata in lighting_setup, la direzione spaziale pura in lighting_direction. Se la direzione è già implicita nel nome del setup (es. "overhead" implica "from above"), svuota lighting_direction.
2. Se lighting_setup descrive più sorgenti (contiene "+", ":", " and ", o più di 5 parole che descrivono sorgenti multiple): trattalo come descrizione multi-sorgente. Aggiungi lighting_direction solo se aggiunge informazione non già presente.
3. Se i campi sono già coerenti e non si sovrappongono: restituiscili invariati.
4. Se original_input è presente e non vuoto: usalo per disambiguare il sistema di illuminazione quando i campi strutturati sono ambigui. Non aggiungere elementi non presenti nei campi luce.

LINGUA: output sempre in inglese.

FORMATO OUTPUT — REGOLA ASSOLUTA:
Rispondi SOLO con JSON valido. Nessun testo prima o dopo, nessuna spiegazione, nessun blocco markdown.
Schema obbligatorio:
{"lighting_direction":"...","lighting_setup":"...","lighting_quality":"..."}`;

const SYSTEM_STILE=`Sei un esperto di storia dell'arte, fotografia, illustrazione e stile visivo per AI image generation (Midjourney, Stable Diffusion, Flux).

Ricevi un JSON con i campi TECNICA (flat, senza sezioni annidate), un subset di SETTING come contesto, e il testo originale dell'utente.

Il tuo compito:
1. Completa i campi vuoti se l'informazione è inferibile dallo stile o dal testo originale
2. Correggi incongruenze stilistiche tra i campi
3. Arricchisci artist_reference se lo stile evoca chiaramente artisti o autori noti — anche se non citati
4. Ricalcola core_style come sintesi coerente di tutti i campi TECNICA — SEMPRE per ultimo, dopo aver ottimizzato tutto il resto
5. Aggiorna elements_to_add e elements_to_avoid in coerenza con lo stile risultante
6. Non modificare ciò che è già coerente e completo

TESTO ORIGINALE — FONTE PRIMARIA DI INFERENZA:
Se original_input è presente e non vuoto, leggilo per primo. Identifica segnali stilistici impliciti non catturati nel JSON strutturato (riferimenti culturali, atmosfera, aggettivi con valenza visiva precisa, materiali citati en passant). Usali per completare i campi vuoti. I campi strutturati sono il punto di partenza; il testo originale è la bussola per l'inferenza.

INFERENZA ARTIST_REFERENCE — PROCEDURA OBBLIGATORIA:

STEP 1 — Identifica il dominio tecnico primario da genre_primary e medium_technique:
photography | painting | illustration | ink_drawing | manga_anime | concept_art | graphic_design | other

STEP 2 — Costruisci il profilo dell'immagine sugli assi rilevanti per il dominio:
- photography: medium (B&W/colore/film/digitale), approccio (geometrico/istintivo/frontale), registro emotivo, qualità luce dominante, contesto geografico/culturale
- painting: tecnica di pennellata, trattamento luce (chiaroscuro/diffusa/piatta/espressionista), figurativo vs astratto, tradizione geografica, registro (intimista/monumentale/narrativo)
- illustration: stile del segno (pulito/texture/sintetico/dettagliato), registro destinazione (bambini/adulti/editoriale/fantasy), medium simulato, peso colore
- ink_drawing: qualità del segno (fluido/spezzato/geometrico), rapporto nero/bianco, grado di sintesi
- manga_anime: scuola demografica (shonen/seinen/shojo/josei), era stilistica, registro narrativo, studio/autore se riconoscibile
- concept_art: finalità (videogioco/film/architettura/world-building), registro (realistico/stilizzato/painterly)

STEP 3 — Per ogni artista/autore considerato: verifica match su ALMENO 3-4 degli assi identificati. Match su 1-2 assi → scarta o metti in dubbio.

STEP 4 — Cerca il secondo e terzo livello di riferimento. Il riferimento più preciso è spesso meno ovvio del nome più famoso per il genere.

STEP 5 — Per stili ibridi o cross-domain: identifica il dominio dominante per l'inferenza principale. Non forzare riferimenti cross-domain se non chiaramente supportati dai dati.

REGOLA CORE_STYLE:
core_style è la sintesi dell'intera sezione TECNICA. Deve catturare il genre, la tecnica dominante, l'estetica e il mood visivo in 3-6 token separati da virgola. Ricalcolalo per ULTIMO, dopo aver ottimizzato tutti gli altri campi.

LINGUA: output sempre in inglese. Valori stringa vuoti come "", array vuoti come [].

FORMATO OUTPUT — REGOLA ASSOLUTA:
Rispondi SOLO con JSON valido contenente TUTTI i campi nello schema seguente. Nessun testo, nessuna spiegazione, nessun blocco markdown. Includi tutti i campi anche se invariati.

Schema obbligatorio (flat):
{"genre_primary":"","genre_modifiers":[],"aesthetic_vibe":"","artist_reference":[],"art_movement":"","era_period":"","medium_technique":"","medium_render_style":"","surface_quality":"","line_quality_style":"","rendering_engine":"","paper_texture":"","grain_texture":"","vignette":"","contrast_level":"","toning":"","accent_color":"","secondary_accent":"","color_temperature":"","color_palette_style":"","saturation_level":"","detail_level":"","abstraction":false,"motion":false,"asymmetrical":false,"core_style":[],"line_quality":[],"elements_to_add":[],"elements_to_avoid":[]}`;

const SYSTEM_PROMPT_OPT=`Sei un esperto di prompt engineering per AI image generation (Midjourney, gpt-image-2, Stable Diffusion, Nano Banana).

Ricevi un prompt già strutturato generato meccanicamente da uno schema JSON, la piattaforma target, e opzionalmente il testo originale dell'utente.

Il tuo compito è ottimizzare il prompt per massimizzare la qualità dell'immagine generata.

OPERAZIONI CONSENTITE:
- Eliminare ridondanze semantiche (stessa informazione espressa due volte con parole diverse)
- Riordinare token se un ordine diverso aumenta il peso semantico per la piattaforma target
- Condensare frasi verbose in token più efficaci per il generatore
- Correggere incongruenze visive (es. illuminazione incompatibile con il genere dichiarato)
- Adattare il vocabolario e la struttura al registro della piattaforma target

OPERAZIONI VIETATE:
- Aggiungere elementi visivi non presenti nell'input
- Cambiare il soggetto, l'azione o la scena
- Modificare i parametri tecnici MJ (--ar, --v, --chaos, --stylize, --weird, ecc.) — passali invariati alla fine
- Superare le 120 parole nel corpo del prompt (esclusi parametri e note di configurazione)

REGOLE PIATTAFORMA-SPECIFICHE:

Se platform è "chatgpt" (gpt-image-2):
- Il modello è reasoning-aware: legge linguaggio naturale descrittivo, NON keyword spam in stile Midjourney.
- Converti i blocchi semicolon-chain ("Genre: X; Aesthetic: Y; Art movement: Z") in frasi brevi ma complete ("A noir-influenced illustration in Art Nouveau style, evoking the aesthetic of dark academia.").
- RIMUOVI tutti i quality descriptor generici: high-resolution, ultra-detailed, editorial quality, award-winning, masterpiece, stunning. Non hanno effetto — la qualità si controlla via parametri API.
- Preserva e rafforza la sezione Constraints: — è la parte più importante per limitare il drift del modello.
- Se manca la riga "Use case:", aggiungila se inferibile (editorial photograph / product mockup / editorial illustration / concept art frame / fine art painting).
- Rimuovi eventuali istruzioni "Reason through..." — gpt-image-2 ha reasoning integrato.
- ARTISTI — regola critica e contestuale: la sezione "Reference artists" contiene nomi di artisti usati come riferimento stilistico. Procedi così:
  1. Per ogni nome nella sezione, valuta se è un artista vivente o un'IP protetta che potrebbe causare blocco del modello.
  2. Se sì: NON rimuovere il riferimento — traducilo in 1-3 descrittori visivi specifici e contestualizzati rispetto al soggetto, alla scena e al mood del prompt che stai ottimizzando. Non usare descrittori generici: sfrutta il contesto per calibrare (es. stesso artista in un prompt di danza vs. un ritratto ambientale produce descrittori diversi).
  3. Se no (maestro deceduto: Vermeer, Rembrandt, Cartier-Bresson, Avedon, Irving Penn, Man Ray, Dorothea Lange, Ansel Adams, Diane Arbus ecc.): lascia il nome invariato — gpt-image-2 lo accetta come riferimento culturale/storico.
  4. Integra i descrittori tradotti nel flusso della frase più appropriata del prompt — non tenerli isolati come lista. L'obiettivo è che lo stile dell'artista permei il testo in modo naturale, non che appaia come un'etichetta sostituita.

Se platform è "midjourney":
- Mantieni struttura token-flow separati da virgola. Efficacia = densità semantica per token.
- Passa i parametri --ar, --v ecc. invariati alla fine del prompt.
- Keyword stacking è appropriato per MJ — non convertire in prosa.

Se platform è "nanobanana":
- Linguaggio naturale fluente, struttura a paragrafo, rimuovi ridondanze. Nessun parametro tecnico.

TESTO ORIGINALE — VERIFICA DI FEDELTÀ:
Se original_input è presente e non vuoto, usalo come criterio arbitrale finale: quando due versioni del prompt sono ugualmente efficaci per il generatore, scegli quella più fedele all'intenzione originale dell'utente. Se il prompt si è allontanato dall'intenzione originale per effetto di ridondanza stilistica, correggilo in direzione dell'originale.

FORMATO OUTPUT — REGOLA ASSOLUTA:
Rispondi SOLO con il prompt ottimizzato come testo puro, pronto da copiare nel generatore. Nessuna spiegazione, nessun commento, nessuna intestazione. I parametri MJ (--ar, --v, ecc.) vanno mantenuti alla fine separati dal corpo da uno spazio.`;

// ─── v9.0 — Fusione algoritmica blocco luce ──────────────────────────────────
// dir: lighting_direction, setup: lighting_setup, quality: lighting_quality
// Produce una stringa coerente per il prompt (Layer 1)
const buildLightBlock=(dir,setup,quality)=>{
  const wc=s=>s?s.trim().split(/\s+/).length:0;
  // Rileva setup multi-sorgente: più sorgenti descritte in un campo unico
  const isMulti=setup&&(/[+:]/.test(setup)||/\band\b/.test(setup)||wc(setup)>5);
  let base="";
  if(setup&&dir){
    if(isMulti){
      // Multi-sorgente: aggiungi dir solo se non già contenuto (check letterale)
      base=setup.toLowerCase().includes(dir.toLowerCase())?setup:setup+", "+dir;
    }else{
      // Sorgente singola: merge con overlap check
      const sl=setup.toLowerCase(),dl=dir.toLowerCase();
      if(dl===sl||sl.includes(dl))base=setup;
      else if(dl.includes(sl))base=dir;
      else base=setup+", "+dir;
    }
  }else if(setup){base=setup;}
  else if(dir){base=dir;}
  if(!base)return quality||"";
  if(!quality)return base;
  return wc(quality)<=2?quality+" "+base:base+", "+quality;
};
