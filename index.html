<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Builder v6.0</title>
<style>
:root {
  --fs: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --fm: 'SF Mono','Menlo','Monaco',monospace;
  --tp: #1a1a1a; --ts: #555; --tt: #888;
  --bp: #ffffff; --bs: #f4f4f2;
  --ok-bg: #e8f5e9; --ok-tx: #2e7d32;
  --info-bg: #e8f0fe; --info-tx: #1a56db; --info-bd: #b5d4f4;
  --warn-bg: #fff8e1; --warn-tx: #b45309;
  --mod-bd: #BA7517; --mod-bg: #FAEEDA;
  --b1: rgba(0,0,0,0.35); --b2: rgba(0,0,0,0.2); --b3: rgba(0,0,0,0.1);
  --r: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --tp: #efefef; --ts: #aaa; --tt: #666;
    --bp: #1e1e1e; --bs: #272727;
    --ok-bg: #1b3a1e; --ok-tx: #81c784;
    --info-bg: #1a2a4a; --info-tx: #82b4f0; --info-bd: #185fa5;
    --warn-bg: #2a1f00; --warn-tx: #fbbf24;
    --mod-bd: #EF9F27; --mod-bg: #2a1f00;
    --b1: rgba(255,255,255,0.3); --b2: rgba(255,255,255,0.18); --b3: rgba(255,255,255,0.09);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fs);background:var(--bs);color:var(--tp);min-height:100vh;padding:32px 20px}
.wrap{max-width:900px;margin:0 auto;background:var(--bp);border:0.5px solid var(--b3);border-radius:12px;padding:24px 28px 32px}
h2{font-size:17px;font-weight:500;color:var(--tp);margin-bottom:2px}
.sub{font-size:12px;color:var(--ts);margin-bottom:20px}
.tabs-bar{display:flex;margin-bottom:20px;border-bottom:0.5px solid var(--b3)}
.tab-btn{padding:8px 20px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--ts);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:var(--fs)}
.tab-btn.on{color:var(--tp);border-bottom-color:var(--tp);font-weight:500}
.json-row{display:flex;gap:8px;margin-bottom:14px;align-items:flex-start}
.json-row textarea{flex:1;height:68px;font-family:var(--fm);font-size:11px;padding:8px 10px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bs);color:var(--tp);resize:none;line-height:1.5}
.json-row textarea:focus{outline:none;border-color:var(--b1)}
.load-btn{padding:8px 14px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bp);color:var(--tp);cursor:pointer;white-space:nowrap;font-family:var(--fs);font-weight:500}
.load-btn:hover{background:var(--bs)}
.load-btn:disabled{opacity:0.4;cursor:not-allowed}
.legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ts)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-d{border:1px solid var(--b2)}
.dot-a{background:var(--info-tx)}
.dot-m{background:var(--mod-bd)}
.acc{border:0.5px solid var(--b3);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.acc-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bp);user-select:none}
.acc-h:hover{background:var(--bs)}
.acc-hl{display:flex;align-items:center;gap:10px}
.acc-title{font-size:13px;font-weight:500;color:var(--tp)}
.acc-sub{font-size:11px;color:var(--tt);margin-top:1px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--info-bg);color:var(--info-tx);font-weight:500}
.badge-v7{font-size:10px;padding:2px 7px;border-radius:var(--r);background:var(--info-bg);color:var(--info-tx);margin-left:8px}
.badge-v8{font-size:10px;padding:2px 7px;border-radius:var(--r);background:var(--warn-bg);color:var(--warn-tx);margin-left:8px}
.chev{font-size:10px;color:var(--tt);transition:transform .15s}
.chev.open{transform:rotate(180deg)}
.acc-b{padding:14px;border-top:0.5px solid var(--b3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 12px}
.fw{grid-column:1/-1}
.fld{display:flex;flex-direction:column;gap:3px}
.lbl{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--ts);text-transform:uppercase;letter-spacing:.06em}
.opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--tt);margin-left:3px;font-size:10px}
.rst{font-size:10px;color:var(--tt);cursor:pointer;margin-left:auto;text-decoration:underline}
.rst:hover{color:var(--ts)}
.inp{font-family:var(--fs);font-size:13px;color:var(--tp);background:var(--bp);border:0.5px solid var(--b2);border-radius:var(--r);padding:6px 10px;width:100%}
.inp:hover{border-color:var(--b1)}
.inp:focus{outline:none;box-shadow:0 0 0 2px var(--b3)}
.inp.a{border-color:var(--info-bd);background:var(--info-bg)}
.inp.m{border-color:var(--mod-bd);background:var(--mod-bg)}
.tags-wrap{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:32px;padding:4px 8px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--bp)}
.tags-wrap.a{border-color:var(--info-bd);background:var(--info-bg)}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bs);border:0.5px solid var(--b3);color:var(--tp)}
.tag.a{background:var(--info-bg);border-color:var(--info-bd);color:var(--info-tx)}
.tag-x{cursor:pointer;font-size:10px;color:var(--tt)}
.tag-x:hover{color:var(--tp)}
.tag-inp{border:none;background:transparent;font-family:var(--fs);font-size:12px;color:var(--tp);outline:none;min-width:70px;flex:1}
.enh-row{display:flex;gap:18px;flex-wrap:wrap}
.check-lbl{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--tp);cursor:pointer}
.tip-text{font-size:11px;color:var(--tt);margin-top:3px}
.warn{font-size:11px;color:var(--warn-tx);margin-top:3px}
.note{font-size:11px;color:var(--ts);padding:8px 10px;background:var(--bs);border-radius:var(--r);margin-bottom:12px;line-height:1.5}
.note-box{background:var(--bs);border:0.5px solid var(--b3);border-radius:var(--r);padding:10px 12px}
.note-title{font-size:11px;font-weight:500;margin-bottom:4px;color:var(--tp)}
.note-val{font-size:11px;color:var(--ts);line-height:1.6;white-space:pre-wrap}
.divider{height:0.5px;background:var(--b3);margin:12px 0}
.sh{font-size:11px;font-weight:500;color:var(--tt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.sec{border-top:0.5px solid var(--b3);padding-top:14px;margin-bottom:14px}
.sec:first-child{border-top:none;padding-top:0}
.sub-tabs{display:flex;gap:4px}
.sub-tab{padding:4px 10px;font-size:11px;border-radius:var(--r);cursor:pointer;background:transparent;border:0.5px solid var(--b3);color:var(--ts);font-family:var(--fs)}
.sub-tab.on{background:var(--bs);border-color:var(--b1);color:var(--tp);font-weight:500}
.mj-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ver-note{font-size:11px;padding:8px 10px;border-radius:var(--r);background:var(--warn-bg);color:var(--warn-tx);margin-bottom:10px;line-height:1.5}
.img-note{font-size:11px;padding:8px 10px;border-radius:var(--r);background:var(--info-bg);color:var(--info-tx);margin-bottom:10px;line-height:1.5}
.dis-note{font-size:12px;color:var(--tt);padding:6px 0}
.ck-sm{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ts);cursor:pointer}
.img-toggle{display:flex;gap:4px;margin-bottom:12px}
.img-btn{padding:5px 12px;font-size:12px;border-radius:var(--r);cursor:pointer;background:transparent;border:0.5px solid var(--b3);color:var(--ts);font-family:var(--fs)}
.img-btn.on{background:var(--bs);border-color:var(--b1);color:var(--tp);font-weight:500}
.fmt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fmt-tabs{display:flex;gap:4px}
.fmt-tab{padding:5px 12px;font-size:12px;border-radius:var(--r);cursor:pointer;background:transparent;border:0.5px solid var(--b3);color:var(--ts);font-family:var(--fs)}
.fmt-tab.on{background:var(--bs);border-color:var(--b1);color:var(--tp);font-weight:500}
.copy-btn{padding:5px 16px;font-size:12px;border-radius:var(--r);cursor:pointer;border:0.5px solid var(--b2);background:transparent;color:var(--tp);font-family:var(--fs);font-weight:500}
.copy-btn.ok{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-tx)}
textarea.out{width:100%;font-family:var(--fm);font-size:12px;padding:12px;border:0.5px solid var(--b3);border-radius:var(--r);background:var(--bs);color:var(--tp);resize:vertical;line-height:1.6}
.preset-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.free-notes{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--b3)}
.mj-note{font-size:11px;color:var(--tt);padding:8px 10px;background:var(--bs);border-radius:var(--r);margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap"><div id="root"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useCallback,createElement:h}=React;

// ─── Constants ───────────────────────────────────────────────────────────────
const V="6.0";
const MJ_TASK_FB="expressive ink sketch watercolor editorial illustration";
const NO_DEFAULT="text, watermark, logo, symmetry, perfect edges, photorealistic skin texture, 3D rendering, CGI";

// ─── Helpers ─────────────────────────────────────────────────────────────────
const sp=s=>s?s.split("|")[0].trim():s;
const dedup=arr=>{const seen=new Set();return arr.filter(item=>{const k=item.toLowerCase().replace(/[\s|,]+/g,"");if(seen.has(k))return false;seen.add(k);return true;});};
const deepEq=(a,b)=>JSON.stringify(a)===JSON.stringify(b);
const isEmpty=v=>v===""||v===false||(Array.isArray(v)&&v.length===0);
const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):"";

// ─── Default values ───────────────────────────────────────────────────────────
const DF_S={
  main_subject:"",subject_action:"",scene_environment:"",mood_emotion:"",
  narrative_context:"",costume:"",props:[],foreground:"",
  time_lighting:"",lighting_direction:"",lighting_setup:"",lighting_quality:"",
  composition_style:"",shooting_angle:"",aspect_ratio:"1:1",free_style_notes:""
};
const DF_T={
  genre_primary:"",genre_modifiers:[],aesthetic_vibe:"",artist_reference:[],
  art_movement:"",era_period:"",
  medium_technique:"",medium_render_style:"",surface_quality:"",
  line_quality_style:"",rendering_engine:"",paper_texture:"",
  lens_focal:"",aperture:"",camera_model:"",film_stock:"",depth_of_field:"",
  grain_texture:"",vignette:"",contrast_level:"",toning:"",
  accent_color:"",secondary_accent:"",color_temperature:"",
  color_palette_style:"",saturation_level:"",detail_level:"",
  abstraction:false,motion:false,asymmetrical:false,
  core_style:[],line_quality:[],elements_to_add:[],elements_to_avoid:[],
  final_instruction:""
};

// ─── localStorage ─────────────────────────────────────────────────────────────
const LS_SP="pb_setting_presets_v1",LS_TP="pb_tecnica_presets_v1",LS_CH="pb_chars_v1";
const lsRead=k=>{try{return JSON.parse(localStorage.getItem(k)||"[]");}catch(e){return[];}};
const lsWrite=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const lsGetSP=()=>lsRead(LS_SP); const lsSetSP=v=>lsWrite(LS_SP,v);
const lsGetTP=()=>lsRead(LS_TP); const lsSetTP=v=>lsWrite(LS_TP,v);
const lsGetChars=()=>lsRead(LS_CH); const lsSetChars=v=>lsWrite(LS_CH,v);

// ─── Preset field lists ───────────────────────────────────────────────────────
const PRESET_S_FIELDS=Object.keys(DF_S);
const PRESET_T_FIELDS=Object.keys(DF_T);
const PRESET_MJ_F=["version","style","quality","stylize","chaos","weird","sref","sw","moodboard"];

// ─── Characters ──────────────────────────────────────────────────────────────
const CHAR_DF={name:"",series:"",gender:"",ethnicity:"",age_apparent:"",height:"",build:"",face_structure:"",features:"",nose:"",hair_color:"",hair_length:"",hair_form:"",hairstyle:"",beard:"",eye_color:"",eye_shape:"",skin:"",mouth_lips:"",distinctive_traits:"",expression:"",posture:"",avoid:"",cref_url:"",cw_default:"85",notes:""};
const assembleCharPrompt=c=>{
  const hp=[c.hair_color,c.hair_length,c.hair_form].filter(Boolean);
  const hair=hp.length>0?hp.join(" ")+" hair":"";
  const hairstyle=c.hairstyle?c.hairstyle+" hairstyle":"";
  const eyes=c.eye_color&&c.eye_shape?c.eye_color+" "+c.eye_shape+" eyes":c.eye_color?c.eye_color+" eyes":c.eye_shape?c.eye_shape+" eyes":"";
  const nose=c.nose?c.nose+" nose":"";
  const mouth=c.mouth_lips?c.mouth_lips+" lips":"";
  return[c.gender,c.ethnicity,c.age_apparent,c.height&&c.height+" height",c.build&&c.build+" build",c.face_structure&&c.face_structure+" face shape",c.features&&c.features+" features",nose,hair,hairstyle,c.beard||"",eyes,mouth,c.skin&&c.skin+" skin",c.distinctive_traits,c.expression&&c.expression+" expression",c.posture&&c.posture+" posture"].filter(Boolean).join(", ");
};

// ─── Datalists ────────────────────────────────────────────────────────────────
const DL={
  genre_primary:["illustration","photography","painting","manga","concept art","3D render","digital painting","watercolor","ink sketch","printmaking","collage","mixed media","comics","woodcut","animation frame","lithography","risograph"],
  aesthetic_vibe:["dark academia","wabi-sabi","vaporwave","retrofuturistic","cottagecore","solarpunk","cyberpunk","steampunk","noir","brutalist","maximalist","minimalist","baroque pop","indie sleaze","lo-fi","dreamcore","goblincore","Y2K","grunge","bohemian","afrofuturism","dieselpunk","atompunk","biopunk","old money","witchcore"],
  art_movement:["Impressionism","Post-Impressionism","Expressionism","Art Nouveau","Art Deco","Bauhaus","Surrealism","Cubism","Romanticism","Baroque","Realism","Pop Art","Abstract Expressionism","Dadaism","Futurism","Minimalism","Symbolism","Constructivism","De Stijl","Fauvism","Gothic","Mannerism","Neoclassicism","Pre-Raphaelite","Social Realism","Street Art","Ukiyo-e","Suprematism","Hyperrealism","Conceptual Art"],
  era_period:["contemporary","2010s","2000s","1990s","1980s","1970s","1960s","1950s","1940s","1930s","1920s","Belle Époque","Victorian","Edwardian","Renaissance","Medieval","Baroque","Roaring Twenties","fin de siècle","Cold War era","Space Age"],
  medium_technique:["oil painting","watercolor","ink sketch","pencil drawing","charcoal","digital painting","gouache","acrylic","pastel","linocut","etching","screen print","collage","photography","cyanotype","tempera","fresco","encaustic","airbrush","marker","woodcut","lithography","risograph","monotype"],
  medium_render_style:["painterly","flat","gritty","raw","hand-crafted","photorealistic","impressionistic","textured","sketch-like","graphic","soft","crisp","loose","tight","gestural","decorative","editorial","naive","expressionistic"],
  paper_texture_dl:["cold-press","hot-press","rough","canvas","Japanese paper","newsprint","vellum","parchment","watercolor paper","toned paper"],
  rendering_engine_dl:["Unreal Engine 5","Octane Render","Blender Cycles","V-Ray","Arnold","Redshift","Marmoset Toolbag"],
  lighting_direction_dl:["from the left","from the right","from above","from below","backlight","front light","side light","45 degrees left","45 degrees right","overhead","rim from behind","diagonal from upper left","diagonal from upper right"],
  shooting_angle_dl:["eye level","low angle","high angle","bird's eye view","worm's eye view","dutch tilt","from behind","over the shoulder","side profile","three-quarter view","close from below","aerial"],
  composition_style_dl:["minimal","cinematic","close-up","wide shot","bird's eye","low angle","portrait","rule of thirds","centered","off-center","extreme close-up","full figure"],
  gender_dl:["woman","man","non-binary","androgynous","girl","boy"],
  ethnicity_dl:["East Asian","Southeast Asian","South Asian","Middle Eastern","Black African","West African","East African","Latino","Hispanic","Mediterranean","Northern European","Eastern European","Indigenous American","Pacific Islander","Mixed"],
  age_apparent:["child","teen","young adult","adult","middle-aged","mature","elderly"],
  height_rel:["petite","short","average","tall","very tall"],
  build_dl:["slim","slender","lean","athletic","muscular","curvy","stocky","heavy"],
  face_structure_dl:["oval","round","square","heart","diamond","oblong","triangular","high cheekbones","flat profile","strong profile","wide jaw","narrow jaw","prominent brow"],
  features_dl:["delicate","sharp","soft","angular","strong","refined","rugged"],
  nose_dl:["straight","Roman","aquiline","upturned","button","broad","wide","flat","bulbous","pointed","high bridge","low bridge","narrow bridge","rounded tip","sharp tip"],
  hair_color_dl:["black","dark brown","brown","auburn","blonde","platinum","red","grey","white","mixed"],
  hair_length_dl:["shaved","very short","short","chin-length","medium","long","very long"],
  hair_form_dl:["straight","wavy","curly","coily","kinky","tightly coiled","afro","thick","fine"],
  hairstyle_dl:["bob","lob","pixie cut","buzz cut","bun","chignon","updo","ponytail","high ponytail","braid","french braid","braids","cornrows","dreadlocks","pigtails","half-up half-down","messy bun","top knot","french twist","space buns","slicked back","side part","center part"],
  beard_dl:["clean-shaven","light stubble","heavy stubble","short beard","full beard","long beard","goatee","circle beard","van dyke","chinstrap","mutton chops","handlebar mustache","pencil mustache","thick mustache","shaved head","bald","receding hairline"],
  mouth_lips_dl:["full lips","thin lips","wide mouth","small mouth","downturned mouth","upturned mouth","defined cupid's bow","prominent lower lip","narrow lips"],
  eye_color_dl:["black","dark brown","brown","hazel","green","blue","grey","amber"],
  eye_shape_dl:["almond","round","hooded","wide","narrow","deep-set","prominent","monolid","hooded monolid","epicanthic fold"],
  skin_dl:["very fair","fair","light","medium","olive","tan","golden","brown","reddish-brown","deep","ebony"],
  expression_dl:["neutral","intense","absorbed","melancholic","stern","gentle","guarded","fierce"],
  posture_dl:["upright","tense","relaxed","closed","confident","slouched","fluid"]
};

// ─── Components ───────────────────────────────────────────────────────────────

const Tip=({text})=>{
  const[show,setShow]=useState(false);
  const[pos,setPos]=useState({top:0,left:0});
  const ref=React.useRef(null);
  const upd=()=>{if(ref.current){const r=ref.current.getBoundingClientRect();setPos({top:r.bottom+6,left:Math.min(r.left,window.innerWidth-250)});}};
  return h("span",{ref,style:{position:"relative",display:"inline-flex",alignItems:"center"},
    onMouseEnter:()=>{upd();setShow(true);},onMouseLeave:()=>setShow(false),
    onClick:e=>{e.stopPropagation();upd();setShow(s=>!s);}},
    h("span",{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:"14px",height:"14px",borderRadius:"50%",background:"var(--b2)",color:"var(--ts)",fontSize:"9px",fontWeight:"700",cursor:"pointer",marginLeft:"4px",lineHeight:"1",flexShrink:0}},"?"),
    show&&ReactDOM.createPortal(
      h("div",{style:{position:"fixed",top:pos.top,left:pos.left,background:"var(--tp)",color:"var(--bp)",padding:"8px 10px",borderRadius:"6px",fontSize:"11px",lineHeight:"1.6",whiteSpace:"pre-line",width:"240px",zIndex:9999,boxShadow:"0 2px 12px rgba(0,0,0,0.3)",pointerEvents:"none"}},text),
      document.body
    )
  );
};

const Dot=({st})=>h("span",{className:`dot ${st==="agent"?"dot-a":st==="modified"?"dot-m":"dot-d"}`});

const Lbl=({label,opt,st,onRst,tip})=>h("div",{className:"lbl"},
  h(Dot,{st}),label,
  tip&&h(Tip,{text:tip}),
  opt&&h("span",{className:"opt"},"opzionale"),
  st==="modified"&&h("span",{className:"rst",onClick:onRst},"ripristina")
);

const TF=({label,fkey,val,onChange,onRst,st,ph,opt,tip})=>
  h("div",{className:"fld"},
    h(Lbl,{label,opt,st,onRst,tip}),
    h("input",{className:`inp${st==="agent"?" a":st==="modified"?" m":""}`,type:"text",value:val,placeholder:ph,onChange:e=>onChange(fkey,e.target.value)})
  );

const TFD=({label,fkey,val,onChange,onRst,st,ph,opt,dl,tip})=>{
  const id=`dl_${fkey}`;
  return h("div",{className:"fld"},
    h(Lbl,{label,opt,st,onRst,tip}),
    h("input",{className:`inp${st==="agent"?" a":st==="modified"?" m":""}`,type:"text",value:val,placeholder:ph,list:id,onChange:e=>onChange(fkey,e.target.value)}),
    h("datalist",{id},dl&&dl.map(o=>h("option",{key:o,value:o})))
  );
};

const SF=({label,fkey,val,onChange,onRst,st,opts})=>
  h("div",{className:"fld"},
    h(Lbl,{label,st,onRst}),
    h("select",{className:`inp${st==="agent"?" a":st==="modified"?" m":""}`,value:val,onChange:e=>onChange(fkey,e.target.value)},
      opts.map(([v,l])=>h("option",{key:v,value:v},l||v))
    )
  );

const MS=({label,val,onChange,opts})=>
  h("div",{className:"fld"},
    h("label",{className:"lbl"},label),

// ─── APP — state + logic ─────────────────────────────────────────────────────
function App(){
  // Field states
  const[setting,setSetting]=useState({...DF_S});
  const[tecnica,setTecnica]=useState({...DF_T});
  // Snap states (agent-loaded values)
  const[snapS,setSnapS]=useState({});
  const[snapT,setSnapT]=useState({});
  // UI
  const[jsonIn,setJsonIn]=useState("");
  const[err,setErr]=useState("");
  const[tab,setTab]=useState("setting");
  const[mjTab,setMjTab]=useState("base");
  const[fmt,setFmt]=useState("midjourney");
  const[copied,setCopied]=useState(false);
  const[imgMode,setImgMode]=useState(false);
  // Accordion open states
  const[openS,setOpenS]=useState({sog:true,amb:true,luce:true});
  const[openT,setOpenT]=useState({id:true,med:false,foto:false,col:false,atm:false,sc:false,enh:true,mjd:false});
  const[openCh,setOpenCh]=useState({arch:true,fis:true,exp:true,ref:true});
  // MJ session state
  const[mj,setMj]=useState({version:"6.1",style:"raw",quality:"1",chaos:"",stylize:"",weird:"",seed:"",tile:false,hd:false,exp:false,sv:"7",sref:"",sw:"",moodboard:"",cref:"",cw:"",iw:"",personalize:"",no_extra:"",useNo:true});
  // Setting presets
  const[sPresets,setSPresets]=useState(()=>lsGetSP());
  const[sPresetName,setSPresetName]=useState("");
  const[selectedSP,setSelectedSP]=useState("");
  const sImportRef=React.useRef(null);
  // Tecnica presets
  const[tPresets,setTPresets]=useState(()=>lsGetTP());
  const[tPresetName,setTPresetName]=useState("");
  const[selectedTP,setSelectedTP]=useState("");
  const tImportRef=React.useRef(null);
  // Characters
  const[chars,setChars]=useState(()=>lsGetChars());
  const[currentChar,setCurrentChar]=useState({...CHAR_DF});
  const[selectedChar,setSelectedChar]=useState("");
  const[charFilter,setCharFilter]=useState("");
  const[loadedCharDesc,setLoadedCharDesc]=useState("");
  const[loadedCharNotes,setLoadedCharNotes]=useState("");
  const importCharsRef=React.useRef(null);

  // ── Field helpers ─────────────────────────────────────────────────────────
  const fsS=k=>{if(snapS[k]===undefined)return"default";return deepEq(setting[k],snapS[k])?"agent":"modified";};
  const fsT=k=>{if(snapT[k]===undefined)return"default";return deepEq(tecnica[k],snapT[k])?"agent":"modified";};
  const setS=useCallback((k,v)=>setSetting(p=>({...p,[k]:v})),[]);
  const rstS=useCallback(k=>{if(snapS[k]!==undefined)setSetting(p=>({...p,[k]:snapS[k]}));},[snapS]);
  const setT=useCallback((k,v)=>setTecnica(p=>({...p,[k]:v})),[]);
  const rstT=useCallback(k=>{if(snapT[k]!==undefined)setTecnica(p=>({...p,[k]:snapT[k]}));},[snapT]);
  const um=k=>e=>setMj(p=>({...p,[k]:e.target.value}));
  const ut=k=>()=>setMj(p=>({...p,[k]:!p[k]}));
  const togS=k=>setOpenS(p=>({...p,[k]:!p[k]}));
  const togT=k=>setOpenT(p=>({...p,[k]:!p[k]}));
  const togCh=k=>setOpenCh(p=>({...p,[k]:!p[k]}));
  const cntS=(...ks)=>ks.filter(k=>!isEmpty(setting[k])).length;
  const cntT=(...ks)=>ks.filter(k=>!isEmpty(tecnica[k])).length;
  const isV7=parseInt(mj.version)===7, isV8=parseInt(mj.version)>=8;
  const fpS=(k,opt)=>({fkey:k,val:setting[k],onChange:setS,onRst:()=>rstS(k),st:fsS(k),opt});
  const fpT=(k,opt)=>({fkey:k,val:tecnica[k],onChange:setT,onRst:()=>rstT(k),st:fsT(k),opt});
  const showFoto=tecnica.genre_primary==="photography"||["lens_focal","aperture","camera_model","film_stock","depth_of_field"].some(k=>tecnica[k]);

  // ── JSON Loader ───────────────────────────────────────────────────────────
  const loadJSON=mode=>{
    setErr("");
    let raw=jsonIn.trim().replace(/^```json\s*/i,"").replace(/\s*```$/,"");
    try{
      const p=JSON.parse(raw);
      // Extractor: handles both {value:"..."} wrapper and plain values
      const ex=(o,...path)=>{
        let c=o;
        for(const k of path){if(!c||typeof c!=="object")return undefined;c=c[k];}
        return(c&&typeof c==="object"&&"value"in c)?c.value:c;
      };

      // ── SETTING ──
      if(mode==="all"||mode==="setting"){
        const src=p.SETTING||{};
        const ns={...DF_S}, ss={};
        const apS=(jk,fk=jk)=>{const v=ex(src,jk);if(v!==undefined&&v!==null&&v!==""){ns[fk]=v;ss[fk]=v;}};
        const apA=(jk,fk=jk)=>{const v=ex(src,jk);if(Array.isArray(v)&&v.length>0){ns[fk]=v;ss[fk]=[...v];}};
        ["main_subject","subject_action","scene_environment","mood_emotion","narrative_context",
         "costume","foreground","time_lighting","lighting_direction","lighting_setup",
         "lighting_quality","composition_style","shooting_angle","aspect_ratio","free_style_notes"
        ].forEach(k=>apS(k));
        apA("props");
        setSetting(ns);
        setSnapS(ss);
      }

      // ── TECNICA ──
      if(mode==="all"||mode==="tecnica"){
        const tec=p.TECNICA||{};
        const nt={...DF_T}, st={};
        const apT=(src,jk,fk=jk)=>{const v=ex(src,jk);if(v!==undefined&&v!==null&&v!==""){nt[fk]=v;st[fk]=v;}};
        const apAT=(src,jk,fk=jk)=>{const v=ex(src,jk);if(Array.isArray(v)&&v.length>0){nt[fk]=v;st[fk]=[...v];}};
        const apBT=(src,jk,fk=jk)=>{const v=ex(src,jk);if(v===true){nt[fk]=true;st[fk]=true;}};

        const id=tec.IDENTITY||{};
        ["genre_primary","aesthetic_vibe","art_movement","era_period"].forEach(k=>apT(id,k));
        apAT(id,"genre_modifiers"); apAT(id,"artist_reference");

        const med=tec.MEDIUM||{};
        ["medium_technique","medium_render_style","surface_quality","line_quality_style","rendering_engine","paper_texture"].forEach(k=>apT(med,k));

        const ph=tec.PHOTOGRAPHY||{};
        ["lens_focal","aperture","camera_model","film_stock","depth_of_field"].forEach(k=>apT(ph,k));

        const col=tec.COLOR||{};
        ["accent_color","secondary_accent","color_temperature","color_palette_style","saturation_level"].forEach(k=>apT(col,k));

        const atm=tec.ATMOSPHERE||{};
        ["grain_texture","vignette","contrast_level","toning"].forEach(k=>apT(atm,k));

        const comp=tec.COMPOSITION||{};
        apT(comp,"detail_level");

        const enh=tec.ENHANCERS||{};
        ["abstraction","motion","asymmetrical"].forEach(k=>apBT(enh,k));

        const sc=tec.STYLE_CORE||{};
        ["core_style","line_quality","elements_to_add","elements_to_avoid"].forEach(k=>apAT(sc,k));
        apT(sc,"final_instruction");

        setTecnica(nt);
        setSnapT(st);

        // MJ defaults only on full load
        if(mode==="all"){
          const mjd=tec.MJ_DEFAULTS||{};
          const mv=ex(mjd,"version"),ms=ex(mjd,"style"),mq=ex(mjd,"quality"),
                mst=ex(mjd,"stylize"),mch=ex(mjd,"chaos"),mw=ex(mjd,"weird");
          setMj(prev=>({...prev,
            ...(mv?{version:mv}:{}),
            ...(ms!==undefined&&ms!==null?{style:ms}:{}),
            ...(mq?{quality:String(mq)}:{}),
            ...(mst?{stylize:String(mst)}:{}),
            ...(mch?{chaos:String(mch)}:{}),
            ...(mw?{weird:String(mw)}:{})
          }));
        }

        // Auto-open accordions that received content
        const hasId=["genre_primary","aesthetic_vibe","art_movement","era_period"].some(k=>st[k])||(st.artist_reference&&st.artist_reference.length>0);
        const hasMed=["medium_technique","medium_render_style"].some(k=>st[k]);
        const hasFoto=["lens_focal","aperture","camera_model","film_stock","depth_of_field"].some(k=>st[k]);
        const hasCol=["accent_color","secondary_accent","color_palette_style","color_temperature"].some(k=>st[k]);
        const hasAtm=["grain_texture","contrast_level","toning"].some(k=>st[k]);
        const hasSc=(st.core_style&&st.core_style.length>0)||(st.elements_to_add&&st.elements_to_add.length>0);
        setOpenT(prev=>({...prev,
          id:hasId||prev.id, med:hasMed||prev.med, foto:hasFoto,
          col:hasCol||prev.col, atm:hasAtm||prev.atm, sc:hasSc||prev.sc
        }));
      }

    }catch(e){setErr("JSON non valido: "+e.message);}
  };

  // ── Nuova scena ───────────────────────────────────────────────────────────
  const clearScene=()=>{setSetting({...DF_S});setLoadedCharDesc("");setLoadedCharNotes("");setSnapS({});};

  // ── Setting presets ───────────────────────────────────────────────────────
  const saveSP=()=>{
    const name=sPresetName.trim();if(!name)return;
    const fields={};PRESET_S_FIELDS.forEach(k=>{fields[k]=setting[k];});
    const entry={name,savedAt:new Date().toLocaleDateString("it-IT"),fields};
    const updated=[...sPresets.filter(p=>p.name!==name),entry];
    setSPresets(updated);lsSetSP(updated);setSPresetName("");
  };
  const loadSP=()=>{
    const p=sPresets.find(x=>x.name===selectedSP);if(!p)return;
    const ns={...setting},ss={};
    PRESET_S_FIELDS.forEach(k=>{if(p.fields[k]!==undefined){ns[k]=p.fields[k];ss[k]=p.fields[k];}});
    setSetting(ns);setSnapS(prev=>({...prev,...ss}));
  };
  const deleteSP=()=>{const u=sPresets.filter(p=>p.name!==selectedSP);setSPresets(u);lsSetSP(u);setSelectedSP("");};
  const exportSP=async()=>{
    if(!sPresets.length)return;
    const toExp=selectedSP?sPresets.filter(p=>p.name===selectedSP):sPresets;
    const n=(selectedSP||"pb_setting_presets").replace(/[^a-z0-9_\-\.]/gi,"_");
    const blob=new Blob([JSON.stringify(toExp,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=n+".json";a.click();URL.revokeObjectURL(url);
  };
  const importSP=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))return;const merged=[...sPresets.filter(p=>!imp.find(i=>i.name===p.name)),...imp];setSPresets(merged);lsSetSP(merged);setSelectedSP("");}catch(err){}e.target.value="";};
    r.readAsText(file);
  };

  // ── Tecnica presets ───────────────────────────────────────────────────────
  const saveTP=()=>{
    const name=tPresetName.trim();if(!name)return;
    const fields={};PRESET_T_FIELDS.forEach(k=>{fields[k]=tecnica[k];});
    const mjFields={};PRESET_MJ_F.forEach(k=>{mjFields[k]=mj[k];});
    const entry={name,savedAt:new Date().toLocaleDateString("it-IT"),fields,mj:mjFields};
    const updated=[...tPresets.filter(p=>p.name!==name),entry];
    setTPresets(updated);lsSetTP(updated);setTPresetName("");
  };
  const loadTP=()=>{
    const p=tPresets.find(x=>x.name===selectedTP);if(!p)return;
    const nt={...tecnica},st={};
    PRESET_T_FIELDS.forEach(k=>{if(p.fields[k]!==undefined){nt[k]=p.fields[k];st[k]=p.fields[k];}});
    setTecnica(nt);setSnapT(prev=>({...prev,...st}));
    if(p.mj)setMj(prev=>({...prev,...p.mj}));
    const hasCol=["accent_color","secondary_accent","color_palette_style"].some(k=>st[k]);
    const hasId=["genre_primary","aesthetic_vibe","art_movement","era_period"].some(k=>st[k]);
    const hasSc=st.core_style&&st.core_style.length>0;
    const hasMed=["medium_technique","medium_render_style"].some(k=>st[k]);
    setOpenT(prev=>({...prev,col:hasCol||prev.col,id:hasId||prev.id,sc:hasSc||prev.sc,med:hasMed||prev.med}));
  };
  const deleteTP=()=>{const u=tPresets.filter(p=>p.name!==selectedTP);setTPresets(u);lsSetTP(u);setSelectedTP("");};
  const exportTP=async()=>{
    if(!tPresets.length)return;
    const toExp=selectedTP?tPresets.filter(p=>p.name===selectedTP):tPresets;
    const n=(selectedTP||"pb_tecnica_presets").replace(/[^a-z0-9_\-\.]/gi,"_");
    const blob=new Blob([JSON.stringify(toExp,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=n+".json";a.click();URL.revokeObjectURL(url);
  };
  const importTP=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))return;const merged=[...tPresets.filter(p=>!imp.find(i=>i.name===p.name)),...imp];setTPresets(merged);lsSetTP(merged);setSelectedTP("");}catch(err){}e.target.value="";};
    r.readAsText(file);
  };

  // ── Characters ────────────────────────────────────────────────────────────
  const setCC=useCallback((k,v)=>setCurrentChar(p=>({...p,[k]:v})),[]);
  const saveChar=()=>{
    const name=currentChar.name.trim();if(!name)return;
    const entry={...currentChar,name};
    const updated=[...chars.filter(c=>c.name!==name),entry];
    setChars(updated);lsSetChars(updated);setSelectedChar(name);
  };
  const deleteChar=()=>{
    const updated=chars.filter(c=>c.name!==selectedChar);
    setChars(updated);lsSetChars(updated);setSelectedChar("");setCurrentChar({...CHAR_DF});
  };
  const loadCharIntoSession=()=>{
    const desc=assembleCharPrompt(currentChar);
    if(desc){
      let ns;
      if(loadedCharDesc){
        const cur=setting.main_subject;
        if(cur===loadedCharDesc)ns=desc;
        else if(cur.startsWith(loadedCharDesc+" — "))ns=desc+" — "+cur.slice(loadedCharDesc.length+3);
        else ns=cur?desc+" — "+cur:desc;
      }else{ns=setting.main_subject?desc+" — "+setting.main_subject:desc;}
      setS("main_subject",ns);setLoadedCharDesc(desc);
    }
    if(currentChar.avoid){
      const items=currentChar.avoid.split(",").map(s=>s.trim()).filter(Boolean);
      if(items.length>0)setT("elements_to_avoid",[...tecnica.elements_to_avoid,...items.filter(i=>!tecnica.elements_to_avoid.includes(i))]);
    }
    if(currentChar.cref_url)setMj(prev=>({...prev,cref:currentChar.cref_url,cw:currentChar.cw_default||"85"}));
    if(currentChar.notes){
      let nfn;
      if(loadedCharNotes&&setting.free_style_notes.includes(loadedCharNotes)){
        nfn=setting.free_style_notes.replace(loadedCharNotes,currentChar.notes).trim();
      }else{nfn=setting.free_style_notes?setting.free_style_notes+" "+currentChar.notes:currentChar.notes;}
      setS("free_style_notes",nfn);setLoadedCharNotes(currentChar.notes);
    }else if(loadedCharNotes&&setting.free_style_notes.includes(loadedCharNotes)){
      setS("free_style_notes",setting.free_style_notes.replace(loadedCharNotes,"").trim());setLoadedCharNotes("");
    }
    setTab("setting");
  };
  const exportChars=()=>{
    const toExp=selectedChar?chars.filter(c=>c.name===selectedChar):chars;
    if(!toExp.length)return;
    const n=(selectedChar||"pb_characters").replace(/[^a-z0-9_\-\.]/gi,"_");
    const blob=new Blob([JSON.stringify(toExp,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=n+".json";a.click();URL.revokeObjectURL(url);
  };
  const importChars=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))return;const merged=[...chars.filter(c=>!imp.find(i=>i.name===c.name)),...imp];setChars(merged);lsSetChars(merged);setSelectedChar("");}catch(err){}e.target.value="";};
    reader.readAsText(file);
  };


// [continua nel prossimo step]
  // ── Prompt assembly ───────────────────────────────────────────────────────
  const s=setting, t=tecnica;
  const styleCore=()=>t.core_style.length>0?t.core_style.join(", "):t.final_instruction||t.medium_technique||MJ_TASK_FB;
  const noList=()=>{const b=t.elements_to_avoid.length>0?t.elements_to_avoid.join(", "):NO_DEFAULT;return mj.no_extra?b+", "+mj.no_extra:b;};
  const getLQ=()=>t.line_quality;
  const getELA=()=>t.elements_to_add;
  const colStr=()=>t.accent_color?t.accent_color+(t.secondary_accent?` and ${t.secondary_accent}`:"")+" accents":"";
  const enhParts=()=>[t.abstraction&&"high abstraction preserving subject identity",t.motion&&"motion via directional ink strokes",t.asymmetrical&&"asymmetrical cinematic composition"].filter(Boolean);

  // Block builders — per le tre gen functions
  const subjectBlock=()=>[sp(s.main_subject),s.subject_action&&sp(s.subject_action),s.costume&&`wearing ${sp(s.costume)}`].filter(Boolean).join(", ");
  const sceneBlock=()=>[s.foreground&&`${sp(s.foreground)} in foreground`,sp(s.scene_environment),...s.props.map(sp).filter(Boolean)].filter(Boolean).join(", ");
  const lightingBlock=()=>[s.time_lighting&&`${sp(s.time_lighting)} lighting`,sp(s.lighting_setup),sp(s.lighting_direction)].filter(Boolean).join(", ");

  const stylV=parseInt(mj.stylize)||0, chaosV=parseInt(mj.chaos)||0, weirdV=parseInt(mj.weird)||0;
  const qHigh=(isV8&&mj.hd)||mj.quality==="4", qLow=mj.quality==="0.25"||mj.quality==="0.5";
  const stylSem=stylV>=601?"maximum artistic freedom — highly stylized and painterly":stylV>=301?"expressive and aesthetically interpreted — strong visual style":stylV>0&&stylV<=100?"precise and literal — minimal artistic elaboration":"";
  const chaosSem=chaosV>=61?"highly experimental and unpredictable composition":chaosV>=21?"varied and unexpected composition":"";

  const genMJ=()=>{
    const sc=sp(styleCore()),enh=enhParts();

    const atmP=[sp(s.lighting_quality),sp(t.grain_texture),t.contrast_level&&`${sp(t.contrast_level)} contrast`,sp(t.toning),t.vignette&&`${sp(t.vignette)} vignette`].filter(Boolean);
    const col=sp(colStr());

  const genGPT=()=>{

    const atmLine=[s.lighting_quality&&`Lighting quality: ${s.lighting_quality}`,t.grain_texture&&`Texture: ${t.grain_texture}`,t.contrast_level&&`Contrast: ${t.contrast_level}`,t.toning&&`Toning: ${t.toning}`,t.vignette&&`Vignette: ${t.vignette}`].filter(Boolean).join("; ");
    const idLine=[t.genre_primary&&`Genre: ${t.genre_primary}`,t.aesthetic_vibe&&`Aesthetic: ${t.aesthetic_vibe}`,t.art_movement&&`Art movement: ${t.art_movement}`,t.era_period&&`Era: ${t.era_period}`,t.artist_reference.length>0&&`Reference artists: ${t.artist_reference.join(", ")}`].filter(Boolean).join("; ");
    const techLine=[t.medium_technique&&`Technique: ${t.medium_technique}`,t.medium_render_style&&`Render style: ${t.medium_render_style}`,t.surface_quality&&`Surface: ${t.surface_quality}`,t.paper_texture&&`Paper: ${t.paper_texture}`,t.lens_focal&&`Focal length: ${t.lens_focal}`,t.film_stock&&`Film stock: ${t.film_stock}`,t.camera_model&&`Camera: ${t.camera_model}`,t.aperture&&`Aperture: ${t.aperture}`,t.depth_of_field&&`Depth of field: ${t.depth_of_field}`,t.rendering_engine&&`Engine: ${t.rendering_engine}`].filter(Boolean).join("; ");
